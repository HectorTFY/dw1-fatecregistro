<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outras mídias no HTML5</title>
</head>
<body>
    <header>
        <h1>Outras mídias no HTML5</h1>
    </header>
    <main>
        <section>
            <h2>Áudio</h2>
            <audio controls src="midias/audio.mp3" alt="Seu navegador não suport áudio."></audio>
            
            <h2>Vídeo</h2>
                <video controls src="mididas/video.mp4" alt="Seu navegador não suport vídeo." type"video/p4" width="400px>"></video>
                    
                

                <h2>Vídeo do Youyube (externo) - iFrame</h2>
                <iframe
                src="https://www.youtube.com/watch?v=3g6WChxY14I "
                title="Exemplo de vídeo do Youtube"
                width="560px"
                height="315px"
                frameborder="0"></iframe>

                <iframe width="560" height="315" src="https://www.youtube.com/embed/3g6WChxY14I?si=dt7Qb0PYfjgQlKE0" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

                <!-- Incorporando Mapas -->
                 <h2>Mapas (iframe)</h2>
                 <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3630.6909639340392!2d-47.84881762373322!3d-24.4961622966015!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94c5338bea658bc1%3A0xdea6f93b5aae61a8!2sFatec%20Registro!5e0!3m2!1spt-BR!2sbr!4v1773192256656!5m2!1spt-BR!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>

                 <!-- Incorporando PDFs -->
                  <h2>PDF (iFrame)</h2>
                  <iframe src="midias/documento.pdf"
                  frameborder="0"
                  width="600px"
                  height="450px">
                </iframe>

                <!-- Incorpotando vetores -->
                 <h2>Vetores (ilustrações)</h2>




        </section>
    </main>
</body>
</html>
