<!-- Estrutura básica HTML -->
 <!DOCTYPE html>
 <!-- Diz ao navegador para utilizar a última versão do HTML -->
  <html lang="pt-br">
  <!-- Atributo lang informa o idioma do site -->
<!-- No head irão as metatags (metadados - informações od site_ -->
<head>
    <!-- charset indica o conjunto de caracteres<meta charset="UTF=8"> -->
    <meta name=""viewport" content="width=device-width, initial-scale=1.0">
    <!-- Permite apresentar uma melhor visualização em dispositivos móveis -->
    <title>Meu website</title>
    <!-- Título exibido na barra do navegador -->
</head>
<!-- Conteúdo do site  - o que o usuário irá visualizar-->
<body>
<h1>Meu site</h1>
<p>Bem-vindo ao meu site</p>
</body>
</html>
